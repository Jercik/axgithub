name: PR Review

on:
  workflow_call:
    inputs:
      label:
        description: "Display label for the review (e.g., 'approach', 'code')"
        type: string
        required: true
      recipes:
        description: >-
          JSON-encoded array of matrix entries. Each entry is either an
          axrecipe recipe name string, or an object {recipe, name} — use
          objects to run the same recipe more than once under distinct job
          names (bare duplicate matrix values are deduplicated).
        type: string
        required: true
      pr_number:
        description: "PR number to review"
        # String (not number): when the caller passes ${{ inputs.pr_number }}
        # or similar, expression interpolation yields a string, which a
        # type: number input rejects — the call fails with zero jobs.
        type: string
        required: true
    secrets:
      NPM_TOKEN:
        required: true
      AXRECIPE_API_KEY:
        required: true

jobs:
  review:
    # Skip fork PRs: pull_request_target runs with secrets, so untrusted code
    # from forks must never execute. workflow_dispatch requires repo write access,
    # so it is safe to allow.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    # Callers must grant at least these permissions on their uses: job.
    # If the caller grants less, GitHub rejects the run at startup with
    # an explicit "requesting X, allowed Y" message — much clearer than
    # a 403 at runtime when posting the review.
    permissions:
      contents: read          # actions/checkout + gh pr view
      pull-requests: write    # recipe posts reviews via GitHub Reviews API
      actions: read           # consistency with caller; harmless if unused
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(inputs.recipes) }}
    # Property access on a string entry evaluates empty, so the || chain
    # falls through to the bare string for back-compat entries.
    name: ${{ inputs.label }} (${{ matrix.entry.name || matrix.entry.recipe || matrix.entry }})
    timeout-minutes: 20
    steps:
      # GitHub's `required: true` on reusable-workflow secrets only validates
      # that the caller maps them — not that the underlying repo secret is
      # defined. A missing `AXRECIPE_API_KEY` at the caller expands to an empty
      # string here and the run fails 30s later inside `axrecipe` with a
      # generic "API key required" message. Fail early with a pointer to the
      # caller's repo secrets page instead.
      - name: Verify required secrets
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          AXRECIPE_API_KEY: ${{ secrets.AXRECIPE_API_KEY }}
        run: |
          missing=()
          [ -n "$NPM_TOKEN" ] || missing+=("NPM_TOKEN")
          [ -n "$AXRECIPE_API_KEY" ] || missing+=("AXRECIPE_API_KEY")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repo secret(s): ${missing[*]}. Set them at https://github.com/${{ github.repository }}/settings/secrets/actions and re-run."
            exit 1
          fi

      - name: Resolve PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(gh pr view "${{ inputs.pr_number }}" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 10

      - name: Strip untrusted project files
        # The checked-out PR tree is attacker-controlled even on a same-repo PR
        # (the fork guard only stops fork heads, not a malicious collaborator).
        # Drop the PR-controlled install config before the credential steps below:
        # the fetch installs to a trusted --prefix that ignores this cwd config, but
        # stripping ./.npmrc upholds the "no PR ./.npmrc beside a live token"
        # invariant, and node_modules goes too so nothing PR-committed can shadow the
        # resolved bin if the --prefix or absolute-path run is ever changed.
        run: rm -rf .npmrc node_modules

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure registry auth
        # No registry-url on setup-node above: it emits no @j4k scope line and would
        # point the DEFAULT registry at the Forge, 404ing public transitive deps — so
        # the scoped ~/.npmrc is written here by hand. GitHub has no Forgejo OIDC
        # issuer, so the credential is the NPM_TOKEN secret input (callers pass their
        # FORGEJO_NPM_TOKEN read PAT as its value); the shell expands it to the
        # literal token, and secrets.* values are auto-masked in logs.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu
          echo "@j4k:registry=https://code.j4k.dev/api/packages/j4k/npm/" > ~/.npmrc
          echo "//code.j4k.dev/api/packages/j4k/npm/:_authToken=${NPM_TOKEN}" >> ~/.npmrc

      - name: Fetch review tooling
        # Version ranges are template-controlled, not read from the PR, so this
        # credential-bearing install processes no untrusted input; --prefix installs
        # to a fresh temp dir outside the workspace (mktemp) and --ignore-scripts
        # blocks any dependency lifecycle hook from running while ~/.npmrc holds the
        # token. axrun and axinstall must be pre-fetched too: the recipe runner
        # resolves them from PATH at review time, after the credential strip below
        # has made the registry unreachable.
        run: |
          set -eu
          review_tools="$(mktemp -d)"
          npm install --prefix "$review_tools" --ignore-scripts @j4k/axrecipe@8 @j4k/axrun@2 @j4k/axinstall@3
          echo "REVIEW_TOOLS_DIR=$review_tools" >> "$GITHUB_ENV"

      - name: Remove registry credentials
        # axrecipe below is an LLM agent that loads the PR's files and instructions
        # with command access; a prompt injection could read ~/.npmrc, so delete the
        # registry token before it touches attacker-controlled PR content. The bin is
        # already resolved, so the review needs no registry access from here on.
        run: rm -f ~/.npmrc

      - name: Run ${{ inputs.label }} review
        # Run the pre-fetched bin directly; npm exec would re-resolve @j4k/axrecipe
        # from the registry the credential strip above just made unreachable. The
        # PATH prepend restores the node_modules/.bin npm exec would have added, so a
        # bin axrecipe spawns by bare name still resolves — only from the trusted
        # prefix, never the stripped PR node_modules.
        env:
          GH_TOKEN: ${{ github.token }}
          AXRECIPE_URL: https://recipe.axkit.dev
          AXRECIPE_API_KEY: ${{ secrets.AXRECIPE_API_KEY }}
          REVIEW_REPOSITORY: ${{ github.repository }}
          REVIEW_PR_NUMBER: ${{ inputs.pr_number }}
        run: >-
          PATH="$REVIEW_TOOLS_DIR/node_modules/.bin:$PATH"
          "$REVIEW_TOOLS_DIR/node_modules/.bin/axrecipe"
          run ${{ matrix.entry.recipe || matrix.entry }}
